front_foot_braking_shock:
  title: "Landing Load"
  explanations:
    kid:
      low: "Your landing step looks under control in this clip."
      moderate: "Your body slows down sharply when the front foot lands. If that keeps happening, the action can lose some flow there."
      high: "Your landing step takes too much of the hit, so the action does not move through smoothly."
    coach:
      low: "Landing load looks under control in this clip."
      moderate: "The body slows sharply at landing. Monitor whether this keeps interrupting flow into the ball."
      high: "The landing phase is taking too much of the hit instead of letting the action carry through."

knee_brace_failure:
  title: "Front Leg"
  explanations:
    kid:
      low: "Your front leg supports your body well at landing."
      moderate: "Your front leg softens a little at landing, so the action has less support."
      high: "Your front leg softens too much at landing, so the rest of the action has less support."
    coach:
      low: "The front leg holds shape well at landing."
      moderate: "The front leg softens at landing. Monitor repetition and fatigue."
      high: "The front leg is not holding shape well enough at landing."

trunk_rotation_snap:
  title: "Body Turn"
  explanations:
    kid:
      low: "Your body turn is smooth in this clip."
      moderate: "Your upper body turns a bit sharply. If that keeps repeating, the trunk can take extra load."
      high: "Your upper body turns too sharply, so the trunk is taking extra load."
    coach:
      low: "Body turn looks smooth in this clip."
      moderate: "The upper body turns a bit sharply. Monitor cumulative exposure."
      high: "The trunk is rotating too abruptly through delivery."

hip_shoulder_mismatch:
  title: "Hips And Shoulders"
  explanations:
    kid:
      low: "Your hips and shoulders work together well."
      moderate: "Your hips and shoulders are not working together cleanly in this clip."
      high: "Your hips and shoulders are too far out of sync, which can load the trunk harder."
    coach:
      low: "Hips and shoulders look connected in this clip."
      moderate: "Hips and shoulders are not working together cleanly. Watch for loss of flow."
      high: "Hips and shoulders are far enough out of sync to raise both flow and load concerns."

lateral_trunk_lean:
  title: "Leaning Sideways"
  explanations:
    kid:
      low: "Your body stays fairly upright in this clip."
      moderate: "You lean to the side while bowling, so the action is less balanced than it could be."
      high: "You lean too far to the side, so the side of the body is taking extra load."
    coach:
      low: "The bowler stays fairly upright in this clip."
      moderate: "Side lean is elevated enough to monitor both balance and side-body load."
      high: "Side lean is strong enough to become a main balance and load concern."

foot_line_deviation:
  title: "Front Foot Line"
  body_region: "groin_side_chain"
  explanations:
    kid:
      low: "Your front foot lands in a good line."
      moderate: >
        Your front foot lands a bit wide.
        That can make balance harder to hold if it keeps showing up.
      high: >
        Your front foot lands too wide, so the action gets pushed off line
        and the side of the body can work harder than it should.
    coach:
      low: "Front foot line looks acceptable in this clip."
      moderate: >
        Front foot line is drifting wider than ideal at landing.
        Monitor whether it starts affecting balance.
      high: >
        Front foot line is wide enough to affect both balance and
        side-body loading.
  cues:
    corrective:
      - "Land your front foot closer to the target line."
      - "Think of running straight through the crease."
      - "Let your hips carry momentum forward, not sideways."
