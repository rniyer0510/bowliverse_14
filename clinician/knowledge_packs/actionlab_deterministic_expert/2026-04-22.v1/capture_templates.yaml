outcome_windows:
  next_3_balls:
    id: next_3_balls
    title: "Next 3 balls"
    summary: "Immediate reaction window for whether the cue is even usable."
    typical_use: "Micro-change checks during a short set."
  same_session:
    id: same_session
    title: "Same session"
    summary: "Short-term retention window inside the same practice session."
    typical_use: "Check whether the cue survives beyond the first few attempts."
  next_session:
    id: next_session
    title: "Next session"
    summary: "Medium-term retention window across separate practice sessions."
    typical_use: "Check whether the change comes back without re-teaching the whole story."
  next_match_window:
    id: next_match_window
    title: "Next match window"
    summary: "Pressure-transfer window for whether the change survives selection or match stress."
    typical_use: "Check whether the bowler keeps or abandons the change under performance pressure."
