version: actionlab.knowledge_pack.history_bindings.v1

history_bindings:
  pace_translation_profile:
    id: pace_translation_profile
    title: "Pace translation profile"
    mechanism_ids:
      - low_build_forcing_late_rescue
      - late_arm_acceleration_due_to_chain_delay
      - high_terminal_impulse_with_high_dissipation_burden
    trajectory_ids:
      - pace_created_late_and_expensively
      - repeatability_loss_under_fatigue
    followup_check_ids:
      - lower_late_thrust_dependence
      - more_stable_release_timing
    metrics:
      - approach_momentum_score
      - terminal_impulse_score
      - release_timing_stability
    primary_metric: terminal_impulse_score
    chart_summary: "Tracks whether pace is being built earlier in the chain instead of being rescued near release."

  transfer_block_stability:
    id: transfer_block_stability
    title: "Transfer and block stability"
    mechanism_ids:
      - gather_disorganization_before_block
      - soft_block_with_trunk_carry
    trajectory_ids:
      - pace_leakage_before_block
      - pace_leakage_at_block
      - trunk_and_front_leg_load_accumulation
    followup_check_ids:
      - reduced_trunk_drift_after_ffc
      - cleaner_transfer_score
    metrics:
      - gather_line_stability
      - front_leg_support_score
      - trunk_drift_after_ffc
      - transfer_efficiency_score
    primary_metric: transfer_efficiency_score
    chart_summary: "Tracks whether the landing leg and trunk are turning landing into a cleaner transfer point."

  dissipation_profile:
    id: dissipation_profile
    title: "Dissipation profile"
    mechanism_ids:
      - soft_block_with_trunk_carry
      - high_terminal_impulse_with_high_dissipation_burden
    trajectory_ids:
      - trunk_and_front_leg_load_accumulation
    followup_check_ids:
      - reduced_dissipation_burden
    metrics:
      - dissipation_burden_score
      - followthrough_asymmetry
      - trunk_fold_severity
    primary_metric: dissipation_burden_score
    chart_summary: "Tracks whether the body is spreading deceleration load more evenly after release."
