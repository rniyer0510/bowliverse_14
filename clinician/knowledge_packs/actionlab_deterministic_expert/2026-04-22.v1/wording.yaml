version: actionlab.knowledge_pack.wording.v1

hedges:
  observed: "This clip appears to show"
  primary_mechanism: "This pattern most likely suggests"
  performance: "Performance-wise, it appears to"
  load: "From a load point of view, this pattern may"

unknown_path:
  primary_mechanism: "No confident deterministic mechanism match yet"
  performance_impact: "ActionLab is holding back a stronger root-cause story because the current symptom bundle is not clear enough yet."
  load_impact: "A stronger load story needs a cleaner or more complete clip before we attach it to this run."
  coach_check: "Capture another clear clip before making a bigger mechanical change from this pathway."

surfaces:
  player:
    primary_mechanism_prefix: "This clip most likely suggests"
    performance_prefix: "Performance-wise, it appears to"
    load_prefix: "From a load point of view, this pattern may"
  coach:
    primary_mechanism_prefix: "Current clip most likely reflects"
    performance_prefix: "Performance implication:"
    load_prefix: "Load implication:"
  reviewer:
    primary_mechanism_prefix: "Reviewer view:"
    performance_prefix: "Performance audit:"
    load_prefix: "Load audit:"
  clinician:
    primary_mechanism_prefix: "Clinical biomechanics view:"
    performance_prefix: "Functional implication:"
    load_prefix: "Load concentration implication:"

unknown_path_surfaces:
  player:
    primary_mechanism: "No confident deterministic mechanism match yet"
    performance_impact: "ActionLab is holding back a stronger root-cause story because the current symptom bundle is not clear enough yet."
    load_impact: "A stronger load story needs a cleaner or more complete clip before we attach it to this run."
    coach_check: "Capture another clear clip before making a bigger mechanical change from this pathway."
  coach:
    primary_mechanism: "Current clip does not clear the deterministic mechanism threshold yet"
    performance_impact: "The current evidence is not strong enough to attach a firmer causal performance story."
    load_impact: "The current evidence is not strong enough to attach a firmer load concentration story."
    coach_check: "Re-capture a cleaner clip or a short set before coaching a stronger causal change from this pathway."
  reviewer:
    primary_mechanism: "Current clip does not clear the deterministic review threshold yet"
    performance_impact: "The current evidence is not strong enough to lock a firmer causal performance interpretation."
    load_impact: "The current evidence is not strong enough to lock a firmer load concentration interpretation."
    coach_check: "Request a cleaner clip or a short repeat set before promoting a stronger review conclusion."
  clinician:
    primary_mechanism: "Current clip remains below the deterministic clinician threshold"
    performance_impact: "The current evidence is not strong enough to attach a firmer functional biomechanics story."
    load_impact: "The current evidence is not strong enough to attach a firmer load-concentration story."
    coach_check: "Re-capture a cleaner clip or a short repeated set before escalating the causal interpretation."

status_leads:
  confident_match:
    player: "This clip is one of the clearer deterministic matches."
    coach: "Current clip is clearing the stronger deterministic threshold."
    reviewer: "Current clip is clearing the stronger deterministic review threshold."
    clinician: "Current clip is clearing the stronger clinician-level deterministic threshold."
  partial_match:
    player: "This clip has a usable root-cause story, but ActionLab is still keeping some caution."
    coach: "Current clip supports a usable primary mechanism, but the evidence is not fully clean."
    reviewer: "Current clip supports a usable primary mechanism, but review caution still applies."
    clinician: "Current clip supports a usable primary mechanism, but the evidence is not yet fully clean."
  weak_match:
    player: "There is an early signal here, but it is still a softer match."
    coach: "Current clip is pointing toward a weak deterministic match only."
    reviewer: "Current clip is still only a weak deterministic review match."
    clinician: "Current clip is still only a weak clinician-level deterministic match."
  ambiguous_match:
    player: "Two nearby root-cause stories are still close together on this clip."
    coach: "Current clip is still split between two nearby deterministic mechanisms."
    reviewer: "Current clip remains split between two nearby deterministic review candidates."
    clinician: "Current clip remains split between two nearby deterministic clinician candidates."
  no_match:
    player: "This clip does not give ActionLab a strong enough root-cause match yet."
    coach: "Current clip is staying below the deterministic match threshold."
    reviewer: "Current clip is staying below the deterministic review threshold."
    clinician: "Current clip is staying below the deterministic clinician threshold."

simple_language:
  exact_overrides:
    "The landing leg does not appear to hold a strong transfer shape through the release window.": "Front leg doesn't hold strong at landing."
    "The chest and trunk continue travelling over the landing base instead of stabilizing into release.": "The body keeps moving past landing instead of settling."
    "The arm appears to accelerate late because earlier chain segments did not set the release on time.": "The arm has to rush late because the body is late."
    "A large share of visible pace generation appears to happen late, close to landing and release.": "Too much of the speed is being made late."
    "The body appears to absorb deceleration unevenly after release, suggesting concentrated late-chain load.": "The finish lands too hard on one side of the body."
    "The release window looks variable enough that the arm and trunk are arriving under late pressure.": "Release timing changes too much from ball to ball."
    "The follow-through appears to dump deceleration abruptly into the trunk and side-body after a late push through release.": "The finish dumps too much force into the body after release."
    "The landing window looks readable, but the action still fails to convert it into a calm transfer before release.": "The action reaches landing, but does not use it well."
  replacements:
    "front-foot contact": "landing"
    "front-foot": "front leg"
    "landing leg": "front leg"
    "release window": "release"
    "trunk": "body"
    "pelvis": "hips"
    "dissipation": "finish"
    "distal chain": "arm"
    "sequencing": "timing"
    "terminal impulse": "late push"
    "late-chain": "late"
    "transfer point": "base"
    "transfer": "power move"
    "proximal-to-distal": "body-to-arm"
    "deceleration": "slowing down"
    "concentrated load": "harder body work"

product_rules:
  - "Mechanism before remedy."
  - "Performance and load are sibling stories."
  - "Primary cause first."
  - "Use the smallest useful intervention first."
  - "Use biomechanical language, not medical diagnosis language."
  - "Keep wording honest with suggests, appears to, likely, and may."
  - "Renderer payloads should stay canonical across player, coach, reviewer, and clinician surfaces."
